<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Registro de Usuario | Colegio Carl Sagan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin-top: 3rem;
    }
    h2 {
      color: #2d3436;
      font-weight: 700;
      text-align: center;
      margin-bottom: 2rem;
    }
    .form-label {
      font-weight: 600;
      color: #2d3436;
    }
    .form-control {
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 1rem;
      border: 1.5px solid #ced4da;
      transition: border-color 0.3s ease;
    }
    .form-control:focus {
      border-color: #4a69bd;
      box-shadow: 0 0 5px rgba(74, 105, 189, 0.4);
    }
    .btn-primary {
      background-color: #4a69bd;
      border-color: #4a69bd;
      font-weight: 600;
      border-radius: 8px;
      padding: 0.5rem 1.5rem;
    }
    .btn-primary:hover {
      background-color: #3b54a0;
      border-color: #3b54a0;
    }
    .btn-outline-primary {
      border-color: #4a69bd;
      color: #4a69bd;
      border-radius: 8px;
    }
    .btn-outline-primary:hover {
      background-color: #4a69bd;
      color: white;
    }
    .text-danger {
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }
    .alert {
      border-radius: 8px;
      font-weight: 600;
    }
    footer {
      margin-top: auto;
      background-color: #2d3436;
      color: white;
      text-align: center;
      padding: 0.7rem 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Registro de Usuario</h2>

  <div th:if="${param.success}" class="alert alert-success">
    Usuario registrado correctamente.
  </div>
  

  <form th:action="@{/register/save}" th:object="${usuario}" method="post">
    <div class="mb-3">
      <label for="nombres" class="form-label">Nombres</label>
      <input type="text" th:field="*{nombres}" class="form-control" id="nombres" placeholder="Ingrese nombres" />
      <div class="text-danger" th:if="${#fields.hasErrors('nombres')}" th:errors="*{nombres}"></div>
    </div>

    <div class="mb-3">
      <label for="apellidos" class="form-label">Apellidos</label>
      <input type="text" th:field="*{apellidos}" class="form-control" id="apellidos" placeholder="Ingrese apellidos" />
      <div class="text-danger" th:if="${#fields.hasErrors('apellidos')}" th:errors="*{apellidos}"></div>
    </div>

    <div class="mb-3">
      <label for="username" class="form-label">Usuario</label>
      <input type="text" th:field="*{username}" class="form-control" id="username" placeholder="Ingrese usuario" />
      <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
    </div>

    <div class="mb-3">
      <label for="clave" class="form-label">Clave</label>
      <input type="password" th:field="*{clave}" class="form-control" id="clave" placeholder="Ingrese clave" />
      <div class="text-danger" th:if="${#fields.hasErrors('clave')}" th:errors="*{clave}"></div>
    </div>

    <div class="mb-4">
      <label for="rol" class="form-label">Rol</label>
      <select class="form-control" th:field="*{rol.id}" id="rol">
        <option value="" disabled selected>Seleccione un rol</option>
        <option th:each="rol : ${listaRoles}" th:value="${rol.id}" th:text="${rol.nombre}"></option>
      </select>
      <div class="text-danger" th:if="${#fields.hasErrors('rol.id')}" th:errors="*{rol.id}"></div>
    </div>

    <div class="d-grid mb-3">
      <button type="submit" class="btn btn-primary">Registrar</button>
    </div>
  </form>

  <div class="text-center">
    ¿Ya tienes cuenta?
    <a href="/" class="btn btn-outline-primary mt-2">Iniciar sesión</a>
  </div>
</div>

<footer>
  © 2025 Colegio Carl Sagan - Todos los derechos reservados
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
