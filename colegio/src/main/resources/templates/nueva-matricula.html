<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Nueva Matrícula | Colegio Carl Sagan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body {
      background: linear-gradient(135deg, #f0f4f8, #dfe6f0);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }
    .navbar {
      background-color: #2d3436;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .navbar-brand {
      font-size: 1.6rem;
      color: #ffffff !important;
      font-weight: 600;
    }
    .card {
      border-radius: 15px;
      border: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }
    .card-header {
      background: linear-gradient(135deg, #28a745, #20c997);
      color: #ffffff;
      font-weight: 700;
      text-align: center;
      font-size: 1.4rem;
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
    }
    .form-label {
      font-weight: 600;
      color: #2d3436;
    }
    .form-control, .form-select {
      border-radius: 8px;
      padding: 0.6rem 1rem;
      border: 1.5px solid #ced4da;
      transition: border-color 0.3s ease;
    }
    .form-control:focus, .form-select:focus {
      border-color: #28a745;
      box-shadow: 0 0 6px rgba(40, 167, 69, 0.4);
    }
    .btn-success {
      background: linear-gradient(135deg, #28a745, #20c997);
      border: none;
      font-weight: 600;
      border-radius: 10px;
      padding: 0.8rem 2rem;
    }
    .btn-secondary {
      background-color: #6c757d;
      border-color: #6c757d;
      font-weight: 600;
      border-radius: 10px;
      padding: 0.8rem 2rem;
    }
    .alert {
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/menu">Colegio Carl Sagan</a>
    <div class="navbar-nav ms-auto">
      <a href="/menu" class="btn btn-secondary me-2">
        <i class="bi bi-arrow-left"></i> Volver al Menú
      </a>
      <form method="post" th:action="@{/logout}" class="d-inline">
        <button type="submit" class="btn btn-danger">
          <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
        </button>
      </form>
    </div>
  </div>
</nav>

<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      
      <!-- Mensaje de éxito -->
      <div th:if="${param.success}" class="alert alert-success text-center mb-4" role="alert">
        <i class="bi bi-check-circle"></i> ¡Matrícula registrada exitosamente!
      </div>

      <div class="card">
        <div class="card-header">
          <i class="bi bi-person-plus"></i> Nueva Matrícula de Alumno
        </div>
        <div class="card-body">
          <form method="post" th:action="@{/matricula/guardar}" th:object="${alumno}" novalidate>
            
            <div class="row">
              <!-- Nombres -->
              <div class="col-md-6 mb-3">
                <label for="nombres" class="form-label">Nombres *</label>
                <input type="text" class="form-control" id="nombres" th:field="*{nombres}" 
                       placeholder="Ingrese los nombres" required>
                <div th:if="${#fields.hasErrors('nombres')}" class="text-danger mt-1">
                  <small th:errors="*{nombres}"></small>
                </div>
              </div>
              
              <!-- Apellidos -->
              <div class="col-md-6 mb-3">
                <label for="apellidos" class="form-label">Apellidos *</label>
                <input type="text" class="form-control" id="apellidos" th:field="*{apellidos}" 
                       placeholder="Ingrese los apellidos" required>
                <div th:if="${#fields.hasErrors('apellidos')}" class="text-danger mt-1">
                  <small th:errors="*{apellidos}"></small>
                </div>
              </div>
            </div>

            <div class="row">
              <!-- DNI -->
              <div class="col-md-6 mb-3">
                <label for="dni" class="form-label">DNI *</label>
                <input type="text" class="form-control" id="dni" th:field="*{dni}" 
                       placeholder="12345678" maxlength="8" required>
                <div th:if="${#fields.hasErrors('dni')}" class="text-danger mt-1">
                  <small th:errors="*{dni}"></small>
                </div>
              </div>
              
              <!-- Fecha de Nacimiento -->
              <div class="col-md-6 mb-3">
                <label for="fechaNacimiento" class="form-label">Fecha de Nacimiento *</label>
                <input type="date" class="form-control" id="fechaNacimiento" th:field="*{fechaNacimiento}" required>
                <div th:if="${#fields.hasErrors('fechaNacimiento')}" class="text-danger mt-1">
                  <small th:errors="*{fechaNacimiento}"></small>
                </div>
              </div>
            </div>

            <div class="row">
              <!-- Grado -->
              <div class="col-md-6 mb-3">
                <label for="grado" class="form-label">Grado *</label>
                <select class="form-select" id="grado" th:field="*{grado.id}" required>
                  <option value="">Seleccione un grado</option>
                  <option th:each="grado : ${listaGrados}" 
                          th:value="${grado.id}" 
                          th:text="${grado.nombre + ' - Sección ' + grado.seccion}">
                  </option>
                </select>
                <div th:if="${#fields.hasErrors('grado.id')}" class="text-danger mt-1">
                  <small th:errors="*{grado.id}"></small>
                </div>
              </div>
              
              <!-- Tutor -->
              <div class="col-md-6 mb-3">
                <label for="tutor" class="form-label">Tutor/Apoderado *</label>
                <select class="form-select" id="tutor" th:field="*{tutor.id}" required>
                  <option value="">Seleccione un tutor</option>
                  <option th:each="tutor : ${listaTutores}" 
                          th:value="${tutor.id}" 
                          th:text="${tutor.nombres + ' ' + tutor.apellidos + ' (' + tutor.parentesco + ')'}">
                  </option>
                </select>
                <div th:if="${#fields.hasErrors('tutor.id')}" class="text-danger mt-1">
                  <small th:errors="*{tutor.id}"></small>
                </div>
              </div>
            </div>

            <!-- Botones -->
            <div class="row mt-4">
              <div class="col-12 text-center">
                <button type="submit" class="btn btn-success me-3">
                  <i class="bi bi-check-circle"></i> Registrar Matrícula
                </button>
                <a href="/matricula" class="btn btn-secondary">
                  <i class="bi bi-x-circle"></i> Cancelar
                </a>
              </div>
            </div>
            
            <div class="mt-3 text-center">
              <small class="text-muted">* Campos obligatorios</small>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="text-center py-3 bg-dark text-white mt-5">
  © 2025 Colegio Carl Sagan - Todos los derechos reservados
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
