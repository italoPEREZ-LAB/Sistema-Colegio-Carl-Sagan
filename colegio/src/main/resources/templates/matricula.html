<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Matrículas | Colegio Carl Sagan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body {
      background: linear-gradient(135deg, #f0f4f8, #dfe6f0);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }
    .navbar {
      background-color: #2d3436;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .navbar-brand {
      font-size: 1.6rem;
      color: #ffffff !important;
      font-weight: 600;
    }
    .card {
      border-radius: 15px;
      border: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }
    .card-header {
      background: linear-gradient(135deg, #17a2b8, #138496);
      color: #ffffff;
      font-weight: 700;
      text-align: center;
      font-size: 1.4rem;
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
    }
    .btn-success {
      background: linear-gradient(135deg, #28a745, #20c997);
      border: none;
      font-weight: 600;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/menu">Colegio Carl Sagan</a>
    <div class="navbar-nav ms-auto">
      <a href="/menu" class="btn btn-secondary me-2">
        <i class="bi bi-arrow-left"></i> Volver al Menú
      </a>
      <form method="post" th:action="@{/logout}" class="d-inline">
        <button type="submit" class="btn btn-danger">
          <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
        </button>
      </form>
    </div>
  </div>
</nav>

<div class="container my-5">
  <!-- Mensaje de éxito -->
  <div th:if="${param.success}" class="alert alert-success text-center mb-4" role="alert">
    <i class="bi bi-check-circle"></i> ¡Matrícula registrada exitosamente!
  </div>

  <div class="card">
    <div class="card-header">
      <i class="bi bi-clipboard-check"></i> Alumnos Matriculados
    </div>
    <div class="card-body">
      <div class="row mb-4">
        <div class="col-md-6">
          <h5 class="text-muted">Lista de Estudiantes Registrados</h5>
        </div>
        <div class="col-md-6 text-end">
          <a href="/matricula/nueva" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> Nueva Matrícula
          </a>
        </div>
      </div>
      
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-info">
            <tr>
              <th>ID</th>
              <th>Nombres</th>
              <th>Apellidos</th>
              <th>DNI</th>
              <th>Fecha Nacimiento</th>
              <th>Grado</th>
              <th>Tutor</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="alumno : ${listaAlumnos}">
              <td th:text="${alumno.id}"></td>
              <td th:text="${alumno.nombres}"></td>
              <td th:text="${alumno.apellidos}"></td>
              <td th:text="${alumno.dni}"></td>
              <td th:text="${alumno.fechaNacimiento}"></td>
              <td th:text="${alumno.grado != null ? alumno.grado.nombre + ' - ' + alumno.grado.seccion : 'Sin asignar'}"></td>
              <td th:text="${alumno.tutor != null ? alumno.tutor.nombres + ' ' + alumno.tutor.apellidos : 'Sin asignar'}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(listaAlumnos)}">
              <td colspan="7" class="text-center text-muted py-4">
                <i class="bi bi-info-circle"></i> 
                No hay alumnos matriculados
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<footer class="text-center py-3 bg-dark text-white mt-5">
  2025 Colegio Carl Sagan - Todos los derechos reservados
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
